<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SharedMinds - Brain Profile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-tint": "#3B82F6",
                        "surface-container-low": "#F8FAFC",
                        "background": "#FDFDFF",
                        "primary-dim": "#2563EB",
                        "on-secondary-fixed": "#334155",
                        "error": "#EF4444",
                        "tertiary-dim": "#059669",
                        "on-surface-variant": "#64748B",
                        "on-secondary-container": "#1E293B",
                        "surface-container": "#F1F5F9",
                        "on-tertiary-container": "#064E3B",
                        "secondary-fixed-dim": "#CBD5E1",
                        "primary": "#3B82F6",
                        "on-tertiary": "#FFFFFF",
                        "outline": "#94A3B8",
                        "secondary-container": "#E2E8F0",
                        "on-error-container": "#7F1D1D",
                        "tertiary-fixed": "#D1FAE5",
                        "secondary-fixed": "#F1F5F9",
                        "primary-fixed": "#DBEAFE",
                        "on-primary-container": "#1E3A8A",
                        "on-primary-fixed-variant": "#1D4ED8",
                        "surface": "#FDFDFF",
                        "surface-dim": "#E2E8F0",
                        "on-tertiary-fixed-variant": "#047857",
                        "primary-container": "#EFF6FF",
                        "inverse-primary": "#93C5FD",
                        "inverse-on-surface": "#F8FAFC",
                        "on-primary-fixed": "#1E3A8A",
                        "surface-container-highest": "#E2E8F0",
                        "on-background": "#0F172A",
                        "on-error": "#FFFFFF",
                        "on-secondary-fixed-variant": "#475569",
                        "surface-container-high": "#EDF2F7",
                        "outline-variant": "#CBD5E1",
                        "error-dim": "#B91C1C",
                        "on-primary": "#FFFFFF",
                        "secondary": "#475569",
                        "on-surface": "#0F172A",
                        "surface-container-lowest": "#FFFFFF",
                        "secondary-dim": "#64748B",
                        "primary-fixed-dim": "#3B82F6",
                        "tertiary": "#10B981",
                        "on-secondary": "#FFFFFF",
                        "tertiary-container": "#D1FAE5",
                        "inverse-surface": "#1E293B",
                        "surface-bright": "#FFFFFF",
                        "error-container": "#FEE2E2",
                        "tertiary-fixed-dim": "#6EE7B7",
                        "on-tertiary-fixed": "#064E3B",
                        "surface-variant": "#F1F5F9"
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1.5rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #3B82F6 0%, #60A5FA 100%);
        }
        .glass-panel {
            backdrop-filter: blur(16px);
            background: rgba(255, 255, 255, 0.8);
        }
        .active-ring {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .soft-shadow {
            box-shadow: 0 4px 24px -2px rgba(0, 0, 0, 0.04);
        }
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
<main class="flex-grow flex flex-col items-center px-6 pt-12 pb-8 max-w-lg mx-auto w-full">
<!-- Progress Indicator -->
<nav class="w-full flex flex-col items-center gap-4 mb-12">
<div class="flex items-center gap-2">
<span class="w-12 h-1.5 bg-primary rounded-full"></span>
<span class="w-12 h-1.5 bg-surface-container-highest rounded-full"></span>
<span class="w-12 h-1.5 bg-surface-container-highest rounded-full"></span>
</div>
<span class="text-on-surface-variant text-xs font-bold uppercase tracking-widest">Step 1 of 3</span>
</nav>
<!-- Header Section -->
<header class="text-center mb-10">
<div class="mb-6 inline-flex items-center justify-center w-16 h-16 bg-primary-container rounded-2xl">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="psychology_alt">psychology_alt</span>
</div>
<h1 class="font-headline text-3xl font-extrabold text-on-surface tracking-tight mb-3">
                Brain Profile
            </h1>
<p class="text-on-surface-variant text-base leading-relaxed">
                Welcome to mindful curation. Let's tailor your experience to your current cognitive flow.
            </p>
</header>
<!-- Brain State Options -->
<section class="flex flex-col gap-4 w-full mb-10">
<!-- Option: Steady -->
<button class="group relative flex items-start p-5 bg-surface-container-lowest rounded-[2rem] border-2 border-transparent hover:border-primary-fixed/30 transition-all duration-300 text-left soft-shadow active:scale-[0.98] min-h-[100px]">
<div class="w-12 h-12 shrink-0 rounded-xl bg-tertiary-container/40 flex items-center justify-center mr-4 group-hover:bg-tertiary-container/60 transition-colors">
<span class="material-symbols-outlined text-tertiary text-2xl" data-icon="waves">waves</span>
</div>
<div class="flex-grow pt-0.5">
<h3 class="font-headline font-bold text-lg text-on-surface mb-0.5">Steady</h3>
<p class="text-on-surface-variant text-sm leading-snug">Grounding focus for deep work.</p>
</div>
<div class="ml-2 mt-1 self-start opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-outline text-2xl" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</div>
</button>
<!-- Option: Flow (Selected) -->
<button class="group relative flex items-start p-5 bg-surface-container-lowest rounded-[2rem] border-2 border-primary active-ring soft-shadow text-left transition-all duration-300 active:scale-[0.98] min-h-[100px]">
<div class="w-12 h-12 shrink-0 rounded-xl bg-primary-container flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="auto_awesome">auto_awesome</span>
</div>
<div class="flex-grow pt-0.5">
<div class="flex items-center gap-2 mb-0.5">
<h3 class="font-headline font-bold text-lg text-on-surface">Flow</h3>
<span class="px-2 py-0.5 bg-primary-fixed text-on-primary-fixed-variant text-[10px] font-extrabold uppercase tracking-wider rounded-full">
                            Recommended
                        </span>
</div>
<p class="text-on-surface-variant text-sm leading-snug">A balanced state of high creativity.</p>
</div>
<div class="ml-2 mt-1 self-start">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option: Busy Mind -->
<button class="group relative flex items-start p-5 bg-surface-container-lowest rounded-[2rem] border-2 border-transparent hover:border-primary-fixed/30 transition-all duration-300 text-left soft-shadow active:scale-[0.98] min-h-[100px]">
<div class="w-12 h-12 shrink-0 rounded-xl bg-error-container/40 flex items-center justify-center mr-4 group-hover:bg-error-container/60 transition-colors">
<span class="material-symbols-outlined text-error text-2xl" data-icon="bolt">bolt</span>
</div>
<div class="flex-grow pt-0.5">
<h3 class="font-headline font-bold text-lg text-on-surface mb-0.5">Busy Mind</h3>
<p class="text-on-surface-variant text-sm leading-snug">Rapid processing. Needs structure.</p>
</div>
<div class="ml-2 mt-1 self-start opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-outline text-2xl" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</div>
</button>
</section>
<!-- Footer Action -->
<footer class="w-full mt-auto flex flex-col items-center gap-4">
<button class="signature-gradient text-on-primary w-full py-4 min-h-[56px] rounded-full font-headline font-bold text-base shadow-[0_8px_24px_-4px_rgba(59,130,246,0.4)] hover:scale-[1.01] active:scale-[0.98] transition-all">
                Continue
            </button>
<button class="text-on-surface-variant font-bold text-sm min-h-[44px] px-6 hover:text-primary transition-colors tracking-wide">
                Skip for now
            </button>
</footer>
</main>
<!-- Ambient Background Decoration -->
<div class="fixed top-[-10%] right-[-10%] -z-10 w-80 h-80 bg-primary-container/20 blur-[100px] rounded-full"></div>
<div class="fixed bottom-[-5%] left-[-5%] -z-10 w-72 h-72 bg-tertiary-container/15 blur-[80px] rounded-full"></div>
</body></html>
